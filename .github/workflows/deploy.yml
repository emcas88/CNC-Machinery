name: Deploy

on:
  push:
    branches:
      - main

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # Only deploy after CI has passed
    needs: []   # CI is a separate workflow; use a workflow_run trigger or branch protection rules
                # to ensure CI passes before this runs. See notes below.

    environment:
      name: production
      url: ${{ vars.DEPLOY_URL }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push backend ────────────────────────────────────────────
      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & push frontend ───────────────────────────────────────────
      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy via SSH to remote server ────────────────────────────────
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            # Pull the freshly built images
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull

            # Run any pending migrations before switching traffic
            docker compose run --rm backend sqlx migrate run

            # Rolling restart — zero-downtime where possible
            docker compose up -d --remove-orphans

            # Clean up old images to reclaim disk space
            docker image prune -f

      # ── Post-deployment smoke test ──────────────────────────────────────
      - name: Smoke test (health check)
        run: |
          DEPLOY_URL="${{ vars.DEPLOY_URL }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "DEPLOY_URL not set — skipping smoke test"
            exit 0
          fi

          echo "Waiting for service to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done

          echo "Health check failed after 2 minutes"
          exit 1

      # ── Notify on failure ───────────────────────────────────────────────
      - name: Notify on deployment failure
        if: failure()
        run: |
          echo "Deployment failed for commit ${{ github.sha }}."
          echo "Triggered by: ${{ github.actor }}"
          echo "See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add Slack / email / PagerDuty notification here as needed.
