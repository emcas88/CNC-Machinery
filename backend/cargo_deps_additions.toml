# =============================================================================
# backend/Cargo.toml — Complete updated [dependencies] section
# F21: Backend Compilation Fixes
# =============================================================================
# This file shows the full [dependencies] block that should replace the existing
# one in backend/Cargo.toml. New entries are marked with "# NEW".

[package]
name = "cnc-backend"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "cnc-backend"
path = "src/main.rs"

[lib]
name = "cnc_backend"
path = "src/lib.rs"

[dependencies]
actix-web = "4"
actix-cors = "0.7"
actix-web-actors = "4"                                   # NEW — WebSocket support
actix-multipart = "0.7"                                  # NEW — File upload handling
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.7", features = [
    "postgres",
    "runtime-tokio-rustls",
    "uuid",
    "chrono",
    "migrate",
    "json",
] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
dotenv = "0.15"
env_logger = "0.11"
log = "0.4"
thiserror = "1"
validator = { version = "0.18", features = ["derive"] }
jsonwebtoken = "9"                                       # NEW — JWT auth tokens
argon2 = "0.5"                                           # NEW — Password hashing
redis = { version = "0.25", features = ["tokio-comp"] }  # NEW — Session / cache store
aws-sdk-s3 = "1"                                         # NEW — S3/MinIO file storage
aws-config = "1"                                         # NEW — AWS credential loading

[dev-dependencies]
actix-rt = "2"
actix-web = { version = "4", features = ["macros"] }
serde_json = "1"
